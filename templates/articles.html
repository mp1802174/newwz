<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文章列表</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">📄 文章列表</h5>
    <a href="/" class="btn btn-sm btn-outline-secondary">← 返回</a>
  </div>

  <!-- 筛选栏 -->
  <form class="row g-2 mb-3" method="get">
    <div class="col-auto">
      <select name="account" class="form-select form-select-sm">
        <option value="">全部公众号</option>
        {% for name in accounts %}
        <option value="{{ name }}" {% if name == current_account %}selected{% endif %}>{{ name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-auto">
      <select name="limit" class="form-select form-select-sm">
        {% for n in [50, 100, 200, 500] %}
        <option value="{{ n }}" {% if n == limit %}selected{% endif %}>最近 {{ n }} 篇</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-auto">
      <button class="btn btn-sm btn-primary">筛选</button>
    </div>
  </form>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-light">
          <tr>
            <th>公众号</th>
            <th>标题</th>
            <th>发布时间</th>
            <th>论坛状态</th>
          </tr>
        </thead>
        <tbody>
          {% for a in articles %}
          <tr>
            <td class="text-muted small">{{ a.account_name }}</td>
            <td><a href="{{ a.article_url }}" target="_blank">{{ a.title }}</a></td>
            <td class="text-muted small">{{ a.publish_timestamp }}</td>
            <td>
              {% if a.forum_published %}
              <span class="badge bg-success">已发布</span>
              {% else %}
              <span class="badge bg-secondary">未发布</span>
              {% endif %}
            </td>
          </tr>
          {% else %}
          <tr><td colspan="4" class="text-center text-muted py-4">暂无文章</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  <div class="text-muted small mt-2">共 {{ articles|length }} 篇</div>

</div>
</body>
</html>
